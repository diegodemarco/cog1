<app-outbound-edit-modal />
<app-crud-page (onNewItem)="doNew()" (onUpdateData)="doUpdateData()" [newItemLiteral]="newItemLiteral">
  @for (o of items; track o.integrationId)
  {
    <c-card>
      <c-card-body>
      <c-row>
        <c-col xs="5">
        <c-row>
          <c-col lg="3">
          <h5 class="mb-0">{{o.integrationId}}</h5>
          </c-col>
          <c-col lg="9">
          {{o.description}}
          </c-col>
        </c-row>
        </c-col>
        <c-col xs="4">
          <c-row>
            <c-col lg="6">
              {{getConnectionDescription(o.integrationConnectionId)}}
            </c-col>
            <c-col lg="6">
              {{o.httpUrl || o.mqttTopic}}
            </c-col>
          </c-row>
        </c-col>
        <c-col xs="3">
          <c-row style="height:100%">
            <c-col style="height:100%; display: flex; align-items: center; justify-content: right;">
              @if (authService.isAdmin) {
                <button cButton size="sm" (click)="doEdit(o)">
                  <svg cIcon [name]="iconSubset.cilPencil" size="md"></svg>
                </button> 
                &nbsp;
                <button cButton size="sm" (click)="doDelete(o)">
                  <svg cIcon [name]="iconSubset.cilTrash" size="md"></svg>
                </button> 
              }
            </c-col>
          </c-row>
        </c-col>
      </c-row>
      </c-card-body>
    </c-card>
  } @empty {
    {{ literals.integrations?.noOutboundIntegrationsToDisplay }}
  }
</app-crud-page>
